<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flower Animation</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to top, #87ceeb, #e0f7ff);
        overflow: hidden;
    }

    .flower {
        position: relative;
        width: 150px;
        height: 150px;
        animation: bloom 3s ease-in-out forwards;
    }

    .petal {
        position: absolute;
        width: 70px;
        height: 120px;
        background: pink;
        border-radius: 50%;
        transform-origin: bottom center;
        opacity: 0;
        animation: petalBloom 2s ease forwards;
    }

    .petal:nth-child(1) { transform: rotate(0deg) translateY(-40px); animation-delay: 0.2s; }
    .petal:nth-child(2) { transform: rotate(45deg) translateY(-40px); animation-delay: 0.4s; }
    .petal:nth-child(3) { transform: rotate(90deg) translateY(-40px); animation-delay: 0.6s; }
    .petal:nth-child(4) { transform: rotate(135deg) translateY(-40px); animation-delay: 0.8s; }
    .petal:nth-child(5) { transform: rotate(180deg) translateY(-40px); animation-delay: 1s; }
    .petal:nth-child(6) { transform: rotate(225deg) translateY(-40px); animation-delay: 1.2s; }
    .petal:nth-child(7) { transform: rotate(270deg) translateY(-40px); animation-delay: 1.4s; }
    .petal:nth-child(8) { transform: rotate(315deg) translateY(-40px); animation-delay: 1.6s; }

    .center {
        position: absolute;
        width: 50px;
        height: 50px;
        background: gold;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        animation: centerPop 1s ease 2s forwards;
    }

    .stem {
        position: absolute;
        width: 10px;
        height: 200px;
        background: green;
        top: 100px;
        left: 50%;
        transform: translateX(-50%) scaleY(0);
        transform-origin: top;
        animation: growStem 2s ease forwards;
    }

    @keyframes petalBloom {
        to {
            opacity: 1;
        }
    }

    @keyframes centerPop {
        to {
            transform: translate(-50%, -50%) scale(1);
        }
    }

    @keyframes growStem {
        to {
            transform: translateX(-50%) scaleY(1);
        }
    }

    @keyframes bloom {
        from { transform: scale(0.5); }
        to { transform: scale(1); }
    }
</style>
</head>
<body>

<div class="flower">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="center"></div>
    <div class="stem"></div>
</div>

</body>
</html>
